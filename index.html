    <script>
        // --- Core OS State & Utilities ---
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        function closeMenus() { 
            document.getElementById('start-menu').style.display = 'none'; 
            document.getElementById('global-context-menu').style.display = 'none';
        }
        
        function toggleMenu(e) {
            e.stopPropagation();
            closeMenus();
            const menu = document.getElementById('start-menu');
            menu.style.display = 'flex';
        }

        // --- File System (VFS) with IndexedDB Persistence ---
        let vfs = {};
        const DB_NAME = "WebBuntuFS";
        
        function initVFS() {
            return {
                '~': { 
                    type: 'dir', 
                    children: {
                        'Documents': { type: 'dir', children: {} },
                        'Downloads': { type: 'dir', children: {} },
                        'ubuntu_deb': { type: 'dir', children: {} }, 
                        'readme.txt': { type: 'file', content: "To use the C2W Terminal:\n1. Ensure your web server has Cross-Origin-Opener-Policy set to 'same-origin'.\n2. Put BOTH your .wasm and your .js glue file in the ubuntu_deb folder on your server!" },
                    }
                },
                'Trash': { type: 'dir', children: {} }
            };
        }

        function loadVFS(callback) {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = e => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('fs')) {
                    db.createObjectStore('fs');
                }
            };
            request.onsuccess = e => {
                const db = e.target.result;
                const tx = db.transaction('fs', 'readonly');
                const getReq = tx.objectStore('fs').get('root');
                getReq.onsuccess = () => {
                    if (getReq.result) {
                        vfs = getReq.result;
                        // Ensure core directories exist
                        if(!vfs['~']) vfs['~'] = { type: 'dir', children: {} };
                        if(!vfs['~'].children['ubuntu_deb']) vfs['~'].children['ubuntu_deb'] = { type: 'dir', children: {} };
                        if(!vfs['Trash']) vfs['Trash'] = { type: 'dir', children: {} };
                    } else {
                        vfs = initVFS();
                        saveVFS();
                    }
                    if(callback) callback();
                };
                getReq.onerror = () => { vfs = initVFS(); if(callback) callback(); };
            };
            request.onerror = () => { vfs = initVFS(); if(callback) callback(); };
        }

        function saveVFS() {
            const request = indexedDB.open(DB_NAME, 1);
            request.onsuccess = e => {
                const db = e.target.result;
                const tx = db.transaction('fs', 'readwrite');
                tx.objectStore('fs').put(vfs, 'root');
            };
        }

        // --- Application Management ---
        const apps = {
            'terminal-window': { title: 'Terminal (c2w)', icon: '💻', open: false, maximized: false, geom: null },
            'fm-window': { title: 'PCManFM', icon: '📁', open: false, maximized: false, geom: null },
            'text-window': { title: 'Text Editor', icon: '📝', open: false, maximized: false, geom: null },
            'browser-window': { title: 'WebSurf', icon: '🌐', open: false, maximized: false, geom: null },
            'image-viewer': { title: 'Image Viewer', icon: '🖼️', open: false, maximized: false, geom: null },
            'media-player': { title: 'Media Player', icon: '▶️', open: false, maximized: false, geom: null },
            'archiver-window': { title: 'lxqt-archiver', icon: '📦', open: false, maximized: false, geom: null }
        };

        let startMenuItems = [
            { id: 'terminal-window', label: '💻 Terminal (x86_64 c2w)' },
            { id: 'fm-window', label: '📁 PCManFM (Files)' },
            { id: 'browser-window', label: '🌐 WebSurf Browser' },
            { id: 'text-window', label: '📝 Text Editor' }
        ];

        function renderStartMenu() {
            const container = document.getElementById('start-menu-items');
            container.innerHTML = '';
            startMenuItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'menu-item';
                div.innerHTML = item.label;
                div.onclick = () => openApp(item.id);
                container.appendChild(div);
            });
        }
        renderStartMenu();

        // --- Window Manager ---
        let zIndexCounter = 100;
        
        function openApp(id) {
            closeMenus();
            const win = document.getElementById(id);
            if(!win) return;
            win.style.display = 'flex';
            apps[id].open = true;
            focusApp(id);
            renderTaskbar();
            if (id === 'fm-window') renderFM();
            if (id === 'terminal-window') setTimeout(initC2WTerminal, 200);
        }

        function closeApp(id) {
            document.getElementById(id).style.display = 'none';
            apps[id].open = false;
            if (apps[id].maximized) maximizeApp(id); 
            renderTaskbar();
        }

        function minimizeApp(id) { document.getElementById(id).style.display = 'none'; renderTaskbar(); }
        
        function maximizeApp(id) {
            const win = document.getElementById(id);
            const app = apps[id];
            if (!app.maximized) {
                app.geom = { top: win.style.top, left: win.style.left, width: win.style.width, height: win.style.height, borderRadius: win.style.borderRadius };
                win.style.top = '0px'; win.style.left = '0px';
                win.style.width = '100%'; win.style.height = 'calc(100% - 36px)';
                win.style.borderRadius = '0px';
                app.maximized = true;
            } else {
                win.style.top = app.geom.top; win.style.left = app.geom.left;
                win.style.width = app.geom.width; win.style.height = app.geom.height;
                win.style.borderRadius = app.geom.borderRadius || '8px';
                app.maximized = false;
            }
        }

        function focusApp(id) {
            zIndexCounter++;
            const win = document.getElementById(id);
            win.style.zIndex = zIndexCounter;
            win.style.display = 'flex';
            renderTaskbar();
        }

        function renderTaskbar() {
            const tbApps = document.getElementById('tb-apps');
            tbApps.innerHTML = '';
            for (const [id, app] of Object.entries(apps)) {
                if (app.open) {
                    const btn = document.createElement('div');
                    btn.className = 'tb-app';
                    const win = document.getElementById(id);
                    if (win.style.display !== 'none' && win.style.zIndex == zIndexCounter) btn.classList.add('active');
                    btn.id = 'tb-' + id;
                    btn.innerHTML = `<span style="font-size:15px">${app.icon}</span> <span>${app.title}</span>`;
                    btn.onclick = () => {
                        if (win.style.display === 'none') focusApp(id);
                        else if (btn.classList.contains('active')) minimizeApp(id);
                        else focusApp(id);
                    };
                    tbApps.appendChild(btn);
                }
            }
        }

        // Draggable & Resizable Logic
        document.querySelectorAll('.window').forEach(win => {
            const titleBar = win.querySelector('.title-bar');
            const resizer = win.querySelector('.resize-handle');
            
            let isDragging = false, dragOffsetX, dragOffsetY;
            if(titleBar) {
                titleBar.addEventListener('mousedown', (e) => {
                    if(e.target.closest('.btn-ctrl')) return;
                    if(apps[win.id] && apps[win.id].maximized) return;
                    isDragging = true;
                    dragOffsetX = e.clientX - win.offsetLeft;
                    dragOffsetY = e.clientY - win.offsetTop;
                    focusApp(win.id);
                });
            }

            let isResizing = false, startW, startH, startX, startY;
            if (resizer) {
                resizer.addEventListener('mousedown', (e) => {
                    if(apps[win.id] && apps[win.id].maximized) return;
                    isResizing = true;
                    startW = win.offsetWidth; startH = win.offsetHeight;
                    startX = e.clientX; startY = e.clientY;
                    e.stopPropagation(); focusApp(win.id);
                });
            }

            let overlay = document.createElement('div');
            overlay.style.position = 'fixed'; overlay.style.inset = '0'; overlay.style.zIndex = '999999'; overlay.style.display = 'none';
            document.body.appendChild(overlay);

            document.addEventListener('mousemove', (e) => {
                if (isDragging) { 
                    overlay.style.display = 'block';
                    win.style.left = (e.clientX - dragOffsetX) + 'px'; 
                    win.style.top = (e.clientY - dragOffsetY) + 'px'; 
                }
                if (isResizing) {
                    overlay.style.display = 'block';
                    win.style.width = Math.max(250, startW + e.clientX - startX) + 'px';
                    win.style.height = Math.max(150, startH + e.clientY - startY) + 'px';
                }
            });

            document.addEventListener('mouseup', () => {
                isDragging = false; isResizing = false;
                overlay.style.display = 'none';
            });
        });


        // --- VFS Navigation Helpers (GUI File Manager) ---
        let currentPathArr = ['~']; 
        
        function getDirNode(pathArr) {
            let curr = vfs[pathArr[0]];
            if (!curr) return null;
            for (let i = 1; i < pathArr.length; i++) {
                if (curr && curr.children && curr.children[pathArr[i]] && curr.children[pathArr[i]].type === 'dir') {
                    curr = curr.children[pathArr[i]];
                } else return null;
            }
            return curr;
        }

        // --- File Opener Router ---
        function openFileNode(filename, node) {
            const ext = filename.split('.').pop().toLowerCase();
            if (['png', 'jpg', 'jpeg', 'gif', 'webp'].includes(ext)) {
                document.getElementById('image-window-title').innerText = `🖼️ ${filename}`;
                document.getElementById('iv-img').src = node.content;
                openApp('image-viewer');
            } else if (['mp3', 'mp4', 'webm', 'ogg', 'wav'].includes(ext)) {
                document.getElementById('media-window-title').innerText = `▶️ ${filename}`;
                document.getElementById('mp-vid').src = node.content;
                document.getElementById('mp-vid').play();
                openApp('media-player');
            } else if (['zip', 'gz', 'tar'].includes(ext)) {
                openArchiveManager(filename, node);
            } else {
                document.getElementById('text-editor-content').value = node.content;
                document.getElementById('text-window-title').innerText = `📝 ${filename}`;
                document.getElementById('text-window').dataset.editingFile = filename;
                openApp('text-window');
            }
        }

        function stopMedia() {
            const vid = document.getElementById('mp-vid');
            vid.pause();
            vid.src = "";
        }

        // --- lxqt-archiver Logic ---
        let currentArchiveData = null;
        let currentArchiveName = "";

        async function openArchiveManager(filename, node) {
            document.getElementById('archiver-window-title').innerText = `📦 lxqt-archiver - ${filename}`;
            currentArchiveName = filename;
            const list = document.getElementById('archiver-list');
            list.innerHTML = '<div style="padding: 10px;">Reading archive...</div>';
            openApp('archiver-window');
            
            try {
                let zip = new JSZip();
                // Strip DataURL prefix if present
                let b64 = node.content.includes(',') ? node.content.split(',')[1] : node.content;
                await zip.loadAsync(b64, {base64: true});
                currentArchiveData = zip;
                list.innerHTML = '';
                zip.forEach((relativePath, zipEntry) => {
                    list.innerHTML += `<div class="archiver-list-item">
                        <span style="font-size: 16px;">${zipEntry.dir ? '📁' : '📄'}</span> ${relativePath}
                    </div>`;
                });
            } catch (e) {
                list.innerHTML = `<div style="padding: 10px; color: red;">Failed to read archive: ${e.message}</div>`;
                currentArchiveData = null;
            }
        }

        async function extractCurrentArchive() {
            if (!currentArchiveData) return;
            const targetDir = getDirNode(currentPathArr);
            if(!targetDir) return;
            
            document.getElementById('archiver-window-title').innerText = `📦 lxqt-archiver - Extracting...`;
            
            for (let relativePath in currentArchiveData.files) {
                let zipEntry = currentArchiveData.files[relativePath];
                if (!zipEntry.dir) {
                    let base64Data = await zipEntry.async("base64");
                    let parts = relativePath.split('/');
                    let filename = parts.pop();
                    
                    targetDir.children[filename] = { 
                        type: 'file', 
                        content: `data:application/octet-stream;base64,${base64Data}` 
                    };
                }
            }
            saveVFS();
            renderFM();
            document.getElementById('archiver-window-title').innerText = `📦 lxqt-archiver - ${currentArchiveName}`;
            alert("Extraction complete to current folder!");
        }

        async function compressToArchive(itemName, node) {
            let zip = new JSZip();
            
            function addToZip(z, n, pathName) {
                if(n.type === 'file') {
                    let b64 = n.content.includes(',') ? n.content.split(',')[1] : btoa(n.content);
                    z.file(pathName, b64, {base64: true});
                } else if(n.type === 'dir') {
                    let folder = z.folder(pathName);
                    for(let k in n.children) {
                        addToZip(folder, n.children[k], k);
                    }
                }
            }
            
            addToZip(zip, node, itemName);
            let content = await zip.generateAsync({type:"base64"});
            let c = getDirNode(currentPathArr);
            c.children[itemName + '.zip'] = { type: 'file', content: "data:application/zip;base64," + content };
            saveVFS();
            renderFM();
        }

        // --- Trash Management ---
        function moveToTrash(itemName, originalPathArr) {
            const currentDir = getDirNode(originalPathArr);
            if (!currentDir || !currentDir.children[itemName]) return;
            
            const node = currentDir.children[itemName];
            node.originalPath = originalPathArr.slice(); // Remember where it came from
            vfs['Trash'].children[itemName] = node;
            delete currentDir.children[itemName];
            saveVFS();
            renderFM();
        }

        function restoreFromTrash(itemName) {
            const node = vfs['Trash'].children[itemName];
            if(!node) return;
            
            let targetPath = node.originalPath || ['~'];
            let targetDir = getDirNode(targetPath);
            
            if (!targetDir) { targetPath = ['~']; targetDir = getDirNode(targetPath); }
            
            // Ensure unique name on restore if collision
            let finalName = itemName;
            let counter = 1;
            while(targetDir.children[finalName]) {
                finalName = `${itemName} (${counter})`;
                counter++;
            }
            
            targetDir.children[finalName] = node;
            delete vfs['Trash'].children[itemName];
            saveVFS();
            renderFM();
        }

        function deletePermanently(itemName) {
            delete vfs['Trash'].children[itemName];
            saveVFS();
            renderFM();
        }

        function emptyTrash() {
            vfs['Trash'].children = {};
            saveVFS();
            renderFM();
        }

        // --- File Manager UI ---
        function clearFmSelection(e) { if(e.target.id === 'fm-body-content') document.querySelectorAll('.fm-item').forEach(el => el.classList.remove('selected')); }
        function goUpDir() { if (currentPathArr.length > 1) { currentPathArr.pop(); renderFM(); } }
        
        function createFolderUI() {
            const name = prompt("New Folder Name:");
            if(!name) return;
            const c = getDirNode(currentPathArr);
            if(c) {
                c.children[name] = { type: 'dir', children: {} };
                saveVFS();
                if(apps['fm-window'].open) renderFM();
            }
        }

        function createNewFile() {
            const name = prompt("New File Name:", "untitled.txt");
            if(!name) return;
            const c = getDirNode(currentPathArr);
            if(c) {
                c.children[name] = { type: 'file', content: "" };
                saveVFS();
                if(apps['fm-window'].open) renderFM();
            }
        }

        function handleImport(e) {
            let files = e.target.files;
            if(!files.length) return;
            let c = getDirNode(currentPathArr);
            if(!c) return;
            
            for(let f of files) {
                let reader = new FileReader();
                reader.onload = (ev) => {
                    c.children[f.name] = { type: 'file', content: ev.target.result };
                    saveVFS();
                    renderFM();
                };
                reader.readAsDataURL(f);
            }
            // Reset input
            e.target.value = '';
        }

        function renderFM() {
            const isTrash = currentPathArr[0] === 'Trash';
            document.getElementById('fm-path-input').value = currentPathArr.join('/');
            document.getElementById('empty-trash-btn').style.display = isTrash ? 'inline-block' : 'none';
            
            const c = getDirNode(currentPathArr);
            const container = document.getElementById('fm-body-content');
            container.innerHTML = '';
            if(!c) return;

            for (let k in c.children) {
                let node = c.children[k];
                let div = document.createElement('div');
                div.className = 'fm-item';
                div.dataset.filename = k;
                
                let icon = '📄';
                if(node.type === 'dir') icon = '📁';
                else if (k.match(/\.(png|jpg|jpeg|gif|webp)$/i)) icon = '🖼️';
                else if (k.match(/\.(mp3|mp4|webm|wav|ogg)$/i)) icon = '▶️';
                else if (k.match(/\.(zip|tar|gz)$/i)) icon = '📦';
                
                div.innerHTML = `<div class="icon">${icon}</div><div class="label">${k}</div>`;
                
                div.onclick = (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.fm-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                };

                div.ondblclick = () => {
                    if (node.type === 'dir') { 
                        currentPathArr.push(k); 
                        renderFM();
                    }
                    else if (node.type === 'file') {
                        openFileNode(k, node);
                    }
                };
                
                // Context Menu Hook for Files
                div.oncontextmenu = (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.fm-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    showFileContextMenu(e, k, node);
                };

                container.appendChild(div);
            }
            
            // Update Trash Icon state
            if(vfs['Trash']) {
                const isEmpty = Object.keys(vfs['Trash'].children).length === 0;
                document.querySelector('#trash-icon .icon').innerText = isEmpty ? '🗑️' : '🚮';
            }
        }

        function saveTextFile() {
            let win = document.getElementById('text-window');
            let filename = win.dataset.editingFile;
            if (!filename) {
                filename = prompt("Enter filename to save:", "untitled.txt");
                if (!filename) return;
                document.getElementById('text-window-title').innerText = `📝 ${filename}`;
                win.dataset.editingFile = filename;
            }
            const content = document.getElementById('text-editor-content').value;
            const c = getDirNode(currentPathArr);
            if (c) {
                c.children[filename] = { type: 'file', content: content };
                saveVFS();
                renderFM();
            }
        }

        // --- Context Menu Management ---
        function handleGlobalContextMenu(e) {
            e.preventDefault();
            // Default: Desktop context menu if clicked on background
            if (e.target.tagName.toLowerCase() === 'html' || e.target.tagName.toLowerCase() === 'body') {
                showDesktopContextMenu(e);
            } else if (e.target.id === 'fm-body-content') {
                showFMBackgroundContextMenu(e);
            }
        }

        function positionContextMenu(e, menu) {
            menu.style.display = 'flex';
            let x = e.clientX;
            let y = e.clientY;
            
            // Adjust to keep on screen
            if (x + menu.offsetWidth > window.innerWidth) x = window.innerWidth - menu.offsetWidth - 10;
            if (y + menu.offsetHeight > window.innerHeight) y = window.innerHeight - menu.offsetHeight - 10;
            
            menu.style.left = `${x}px`;
            menu.style.top = `${y}px`;
        }

        function showDesktopContextMenu(e) {
            closeMenus();
            const menu = document.getElementById('global-context-menu');
            currentPathArr = ['~']; // Reset path for desktop operations
            menu.innerHTML = `
                <div class="menu-item" onclick="createFolderUI()">➕ New Folder</div>
                <div class="menu-item" onclick="createNewFile()">📄 New Text File</div>
                <div class="menu-divider"></div>
                <div class="menu-item" onclick="location.reload()">⏻ Refresh Desktop</div>
            `;
            positionContextMenu(e, menu);
        }

        function showFMBackgroundContextMenu(e) {
            closeMenus();
            const isTrash = currentPathArr[0] === 'Trash';
            if (isTrash) return; // Disable creation in trash
            
            const menu = document.getElementById('global-context-menu');
            menu.innerHTML = `
                <div class="menu-item" onclick="createFolderUI()">➕ New Folder Here</div>
                <div class="menu-item" onclick="createNewFile()">📄 New Text File</div>
                <div class="menu-item" onclick="document.getElementById('file-import-input').click()">📥 Import File Here</div>
            `;
            positionContextMenu(e, menu);
        }

        function showFileContextMenu(e, filename, node) {
            closeMenus();
            const menu = document.getElementById('global-context-menu');
            const isTrash = currentPathArr[0] === 'Trash';
            
            let html = '';
            
            if (isTrash) {
                html += `<div class="menu-item" onclick="restoreFromTrash('${filename}')">↩️ Restore</div>`;
                html += `<div class="menu-divider"></div>`;
                html += `<div class="menu-item danger" onclick="deletePermanently('${filename}')">❌ Delete Permanently</div>`;
            } else {
                if (node.type === 'file') {
                    html += `<div class="menu-item" onclick="openFileNode('${filename}', getDirNode(currentPathArr).children['${filename}'])">📂 Open File</div>`;
                } else {
                    html += `<div class="menu-item" onclick="currentPathArr.push('${filename}'); renderFM();">📂 Open Folder</div>`;
                }
                
                html += `<div class="menu-item" onclick="compressToArchive('${filename}', getDirNode(currentPathArr).children['${filename}'])">📦 Compress to Archive (.zip)</div>`;
                
                html += `<div class="menu-divider"></div>`;
                
                html += `<div class="menu-item" onclick="
                    let newName = prompt('Rename:', '${filename}');
                    if(newName && newName !== '${filename}') {
                        let c = getDirNode(currentPathArr);
                        c.children[newName] = c.children['${filename}'];
                        delete c.children['${filename}'];
                        saveVFS(); renderFM();
                    }
                ">✏️ Rename</div>`;
                
                html += `<div class="menu-item danger" onclick="moveToTrash('${filename}', currentPathArr)">🗑️ Move to Trash</div>`;
            }
            
            menu.innerHTML = html;
            positionContextMenu(e, menu);
        }

        // --- Container2Wasm (c2w) Engine with Emscripten Setup ---
        let term, fitAddon;
        let c2wBooted = false;

        async function initC2WTerminal() {
            if (c2wBooted) return;
            
            term = new Terminal({
                cursorBlink: true,
                theme: { background: '#000000', foreground: '#ffffff' },
                fontFamily: '"Consolas", "Courier New", monospace',
                fontSize: 14
            });
            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            
            const container = document.getElementById('terminal-container');
            term.open(container);
            fitAddon.fit();
            
            window.addEventListener('resize', () => fitAddon.fit());
            new ResizeObserver(() => fitAddon.fit()).observe(container);

            term.writeln('\x1b[36;1m=== WebBuntu Emscripten (c2w) Bootloader ===\x1b[0m');
            term.writeln('\x1b[33m[SYSTEM] Verifying Browser Security Policies...\x1b[0m');

            // 1. Verify SharedArrayBuffer (MANDATORY for c2w/Emscripten multi-threading)
            if (typeof SharedArrayBuffer === 'undefined') {
                term.writeln('\r\n\x1b[31;1m[FATAL ERROR] SharedArrayBuffer is not defined!\x1b[0m');
                term.writeln('\x1b[31mYour browser blocked the emulator from starting because your web server is missing security headers.\x1b[0m');
                term.writeln('\x1b[33mTo fix this, you MUST configure your web server to send:\x1b[0m');
                term.writeln('  Cross-Origin-Opener-Policy: same-origin');
                term.writeln('  Cross-Origin-Embedder-Policy: require-corp');
                term.writeln('\x1b[36m(If you are using Python to test locally, run: python3 server.py instead of simple.http.server, and add those headers!)\x1b[0m');
                return;
            } else {
                term.writeln('\x1b[32m[SYSTEM] Security policies OK (Cross-Origin Isolated).\x1b[0m');
            }

            term.writeln('\x1b[36m[SYSTEM] Preparing WASI Runtime for raw ubuntu.wasm...\x1b[0m');

            // 2. Native WASI Polyfill (Handles .wasm natively without a .js file)
            let wasmMemory;
            let inputBuffer = [];
            
            // Capture keystrokes from xterm and feed to WASM
            term.onData(data => {
                for(let i=0; i<data.length; i++) inputBuffer.push(data.charCodeAt(i));
            });

            const wasi_snapshot_preview1 = {
                proc_exit: (code) => term.writeln(`\r\n\x1b[31m[Process exited with code ${code}]\x1b[0m`),
                fd_write: (fd, iovs, iovs_len, nwritten) => {
                    if (!wasmMemory) return 0;
                    const view = new DataView(wasmMemory.buffer);
                    let written = 0;
                    for (let i = 0; i < iovs_len; i++) {
                        const ptr = view.getUint32(iovs + i * 8, true);
                        const len = view.getUint32(iovs + i * 8 + 4, true);
                        const bytes = new Uint8Array(wasmMemory.buffer, ptr, len);
                        term.write(new TextDecoder('utf8').decode(bytes)); // Output directly to xterm
                        written += len;
                    }
                    view.setUint32(nwritten, written, true);
                    return 0; // Success
                },
                fd_read: (fd, iovs, iovs_len, nread) => {
                    if (!wasmMemory) return 0;
                    if (inputBuffer.length === 0) return 6; // EAGAIN
                    const view = new DataView(wasmMemory.buffer);
                    let bytesRead = 0;
                    for (let i = 0; i < iovs_len; i++) {
                        const ptr = view.getUint32(iovs + i * 8, true);
                        const len = view.getUint32(iovs + i * 8 + 4, true);
                        const outBuffer = new Uint8Array(wasmMemory.buffer, ptr, len);
                        while(bytesRead < len && inputBuffer.length > 0) {
                            outBuffer[bytesRead++] = inputBuffer.shift();
                        }
                    }
                    view.setUint32(nread, bytesRead, true);
                    return 0;
                },
                fd_seek: () => 0, fd_close: () => 0, fd_fdstat_get: () => 0, fd_prestat_get: () => 8, fd_prestat_dir_name: () => 28,
                environ_sizes_get: (c, s) => { const v = new DataView(wasmMemory.buffer); v.setUint32(c,0,true); v.setUint32(s,0,true); return 0; },
                environ_get: () => 0,
                args_sizes_get: (c, s) => { const v = new DataView(wasmMemory.buffer); v.setUint32(c,0,true); v.setUint32(s,0,true); return 0; },
                args_get: () => 0,
                random_get: (buf, len) => { crypto.getRandomValues(new Uint8Array(wasmMemory.buffer, buf, len)); return 0; },
                clock_time_get: () => 0, poll_oneoff: () => 0
            };

            const importObject = {
                wasi_snapshot_preview1: wasi_snapshot_preview1,
                env: { }
            };

            // 3. Fetch and Instantiate the WebAssembly directly
            try {
                term.writeln('\x1b[33m[SYSTEM] Fetching ubuntu_deb/ubuntu.wasm...\x1b[0m');
                const response = await fetch('ubuntu_deb/ubuntu.wasm');
                if (!response.ok) throw new Error(`HTTP ${response.status} - File not found. Make sure ubuntu.wasm is in the ubuntu_deb folder!`);
                
                const { instance } = await WebAssembly.instantiateStreaming(response, importObject);
                wasmMemory = instance.exports.memory;
                
                term.writeln('\x1b[32m[SYSTEM] Wasm instantiated successfully! Booting OS...\x1b[0m\r\n');
                
                // Start the WASI application
                if (instance.exports._start) {
                    setTimeout(() => {
                        try { instance.exports._start(); } 
                        catch(e) { term.writeln(`\r\n\x1b[31m[WASM EXCEPTION] ${e.message}\x1b[0m`); }
                    }, 50);
                } else {
                    term.writeln('\x1b[31m[ERROR] No _start function found in Wasm module.\x1b[0m');
                }
            } catch (err) {
                term.writeln(`\r\n\x1b[31;1m[FATAL ERROR] ${err.message}\x1b[0m`);
            }

            c2wBooted = true;
        }

        // Init System Once Loaded
        window.onload = () => {
            loadVFS(() => {
                // Pre-render state silently
            });
        };
